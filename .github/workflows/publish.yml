name: Publier l'image

# Se déclenche quand on pousse un tag de version, ex. : git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # 1) On rejoue toute la suite de tests (workflow réutilisable) avant de publier.
  tests:
    uses: ./.github/workflows/tests.yml

  # 2) Publication seulement si les tests passent.
  publish:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Génère les tags depuis le tag Git : v1.2.3 -> 1.2.3, 1.2, latest
      - name: Calculer les tags de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: overconsulting/phppgadmin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build (stage prod) & push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Publie le README comme description du dépôt Docker Hub (sinon la page reste vide).
      - name: Synchroniser la description Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: overconsulting/phppgadmin
          short-description: "Interface web PostgreSQL (FrankenPHP), configurable par variables d'environnement."
          readme-filepath: ./README.md
